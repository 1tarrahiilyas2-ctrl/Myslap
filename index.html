<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MySlap</title>
<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:#ff0080;
padding:20px;
font-size:30px;
font-weight:bold;
}

nav{
background:#222;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.post{
background:#1e1e1e;
margin:20px auto;
padding:15px;
border-radius:10px;
width:300px;
}

button{
background:#ff0080;
border:none;
padding:10px;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>MySlap</header>

<nav>
<a href="#">Home</a>
<a href="#">Video's</a>
<a href="#">Profielen</a>
<a href="#">Upload</a>
</nav>

<div class="container">

<div class="post">
<h3>Mijn eerste video</h3>
<video width="250" controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<div class="post">
<h3>Status</h3>
<p>Welkom op mijn MySlap website!</p>
<button onclick="like()">Like 👍</button>
<p id="likes">0 likes</p>
</div>

</div>

<script>
let likes = 0;

function like(){
likes++;
document.getElementById("likes").innerText = likes + " likes";
}
</script>

</body>
</html>
