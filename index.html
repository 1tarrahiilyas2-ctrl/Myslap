<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MySlap</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#111; color:white; }
header{ background:#ff0080; padding:15px; display:flex; align-items:center; justify-content:center; }
header img{ height:50px; }
nav{ background:#222; padding:10px; text-align:center; }
nav a{ color:white; margin:15px; text-decoration:none; font-weight:bold; }
.container{ display:flex; flex-direction:column; align-items:center; padding:20px; max-width:800px; margin:auto; }
.post{ background:#1e1e1e; margin:20px; padding:15px; border-radius:10px; width:100%; }
iframe, video{ width:100%; border-radius:10px; margin-bottom:10px; }
button{ background:#ff0080; border:none; padding:8px 15px; color:white; border-radius:5px; cursor:pointer; margin-right:5px; }
.comments{ margin-top:10px; max-height:150px; overflow-y:auto; background:#222; padding:5px; border-radius:5px; }
.comment-input{ width:100%; padding:5px; margin-top:5px; border-radius:5px; border:none; }
input, select { padding:5px; border-radius:5px; border:none; margin-right:5px; }
.feed { width:100%; display:flex; flex-direction:column; }
</style>
</head>
<body>

<header>
<img src="https://i.imgur.com/TUw8M7f.png" alt="MySlap Logo">
</header>

<nav>
<a href="#" onclick="showFeed()">Home</a>
<a href="#" onclick="showTrending()">Trending</a>
<a href="#" onclick="showUpload()">Upload</a>
<a href="#" onclick="showLogin()">Login/Register</a>
</nav>

<div class="container" id="mainContainer">

<!-- Login/Register -->
<div id="loginDiv">
<h3>Login / Register</h3>
<input type="text" id="usernameInput" placeholder="Gebruikersnaam">
<button onclick="login()">Login / Register</button>
<p id="loginMsg"></p>
</div>

<!-- Upload -->
<div id="uploadDiv" style="display:none;">
<h3>Nieuwe Post Uploaden</h3>
<input type="text" id="videoLink" placeholder="YouTube link of MP4 URL">
<input type="text" id="mood" placeholder="Mood: 😎">
<input type="text" id="feeling" placeholder="Feeling: 😢">
<button onclick="uploadPost()">Upload</button>
</div>

<!-- Feed -->
<div class="feed" id="feedDiv" style="display:none;"></div>

</div>

<script>
// Gebruiker systeem
let currentUser = localStorage.getItem('currentUser') || null;
let users = JSON.parse(localStorage.getItem('users')) || {};
let posts = JSON.parse(localStorage.getItem('posts')) || [];

// Like systeem
let likedPosts = JSON.parse(sessionStorage.getItem('likedPosts')) || {};

// Login / Register
function login(){
    let username = document.getElementById('usernameInput').value.trim();
    if(!username){ alert("Vul een gebruikersnaam in!"); return; }
    if(!users[username]){ users[username] = {name: username}; localStorage.setItem('users', JSON.stringify(users)); }
    currentUser = username;
    localStorage.setItem('currentUser', currentUser);
    document.getElementById('loginMsg').innerText = "Ingelogd als " + currentUser;
    showFeed();
}

// Show / Hide divs
function showFeed(){ document.getElementById('feedDiv').style.display='flex'; document.getElementById('uploadDiv').style.display='none'; document.getElementById('loginDiv').style.display='none'; renderFeed(); }
function showUpload(){ document.getElementById('feedDiv').style.display='none'; document.getElementById('uploadDiv').style.display='block'; document.getElementById('loginDiv').style.display='none'; }
function showLogin(){ document.getElementById('feedDiv').style.display='none'; document.getElementById('uploadDiv').style.display='none'; document.getElementById('loginDiv').style.display='block'; }

// Upload post
function uploadPost(){
    if(!currentUser){ alert("Je moet inloggen!"); return; }
    let video = document.getElementById('videoLink').value.trim();
    let mood = document.getElementById('mood').value.trim();
    let feeling = document.getElementById('feeling').value.trim();
    if(!video){ alert("Vul een video link in!"); return; }
    posts.unshift({user:currentUser, video, mood, feeling, likes:0, comments:[]});
    localStorage.setItem('posts', JSON.stringify(posts));
    document.getElementById('videoLink').value=''; document.getElementById('mood').value=''; document.getElementById('feeling').value='';
    showFeed();
}

// Render feed
function renderFeed(){
    let feed = document.getElementById('feedDiv');
    feed.innerHTML='';
    posts.forEach((p, idx)=>{
        let postDiv = document.createElement('div');
        postDiv.className='post';
        let videoElem;
        if(p.video.includes("youtube.com") || p.video.includes("youtu.be")){
            let vidId = p.video.split("v=")[1] || p.video.split("shorts/")[1];
            if(vidId.includes("&")) vidId=vidId.split("&")[0];
            videoElem = document.createElement('iframe');
            videoElem.src="https://www.youtube.com/embed/"+vidId;
            videoElem.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
            videoElem.allowFullscreen = true;
        } else {
            videoElem = document.createElement('video');
            videoElem.src = p.video; videoElem.controls=true;
        }
        postDiv.appendChild(videoElem);
        postDiv.innerHTML += `<p><b>${p.user}</b></p>`;
        if(p.mood) postDiv.innerHTML += `<p>Mood: ${p.mood}</p>`;
        if(p.feeling) postDiv.innerHTML += `<p>Feeling: ${p.feeling}</p>`;
        let likeBtn = document.createElement('button');
        likeBtn.innerText='👍 Like';
        likeBtn.onclick = ()=>{if(likedPosts[idx]){alert("Je kan deze post maar 1 keer liken!"); return;} likedPosts[idx]=true; p.likes++; localStorage.setItem('posts', JSON.stringify(posts)); sessionStorage.setItem('likedPosts', JSON.stringify(likedPosts)); renderFeed();}
        let shareBtn = document.createElement('button');
        shareBtn.innerText='🔗 Share'; shareBtn.onclick = ()=>{navigator.clipboard.writeText(window.location.href+"#post"+idx); alert("Link gekopieerd!");}
        postDiv.appendChild(likeBtn);
        let likeCount = document.createElement('span'); likeCount.innerText=p.likes+" likes"; postDiv.appendChild(likeCount);
        postDiv.appendChild(shareBtn);
        // Comments
        let commentsDiv = document.createElement('div'); commentsDiv.className='comments';
        p.comments.forEach(c=>{let cdiv=document.createElement('div'); cdiv.innerText=c.user+": "+c.text; commentsDiv.appendChild(cdiv);});
        postDiv.appendChild(commentsDiv);
        let commentInput = document.createElement('input'); commentInput.className='comment-input'; commentInput.placeholder='Type hier je comment...'; commentInput.onkeypress=(e)=>{if(e.key==='Enter' && commentInput.value.trim()!==''){p.comments.push({user:currentUser,text:commentInput.value}); localStorage.setItem('posts', JSON.stringify(posts)); renderFeed();}};
        postDiv.appendChild(commentInput);
        feed.appendChild(postDiv);
    });
}

// Trending (scroll)
function showTrending(){ showFeed(); }

if(currentUser) showFeed();
</script>

</body>
</html>
