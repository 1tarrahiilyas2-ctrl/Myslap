<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>MySlap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<img src="logo.png" alt="MySlap Logo" class="logo">
</header>

<nav>
<a href="#" onclick="showFeed()">Home</a>
<a href="#" onclick="showTrending()">Trending</a>
<a href="#" onclick="showUpload()">Upload</a>
<a href="#" onclick="showLogin()">Login/Register</a>
</nav>

<div class="container" id="mainContainer">

<!-- Login/Register -->
<div id="loginDiv">
<h3>Login / Register</h3>
<input type="text" id="usernameInput" placeholder="Gebruikersnaam">
<button onclick="login()">Login / Register</button>
<p id="loginMsg"></p>
</div>

<!-- Upload -->
<div id="uploadDiv" style="display:none;">
<h3>Nieuwe Post Uploaden</h3>
<button onclick="startCamera()">📹 Video opnemen</button>
<button onclick="takePhoto()">📸 Foto maken</button>
<input type="file" id="fileInput" accept="video/*,image/*">
<input type="text" id="mood" placeholder="Mood: 😎">
<button onclick="uploadPost()">Upload</button>
<video id="cameraVideo" autoplay muted style="display:none;" width="320" height="240"></video>
<canvas id="photoCanvas" style="display:none;"></canvas>
</div>

<!-- Feed -->
<div class="feed" id="feedDiv" style="display:none;"></div>

</div>

<script src="script.js"></script>
</body>
</html>
